<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Court Proforma — ACJM Baghpat</title>
<style>
:root{--f:"Noto Sans Devanagari","Mangal","Arial Unicode MS",Arial,sans-serif;--b:#1a237e;--b2:#3949ab;--g:#2e7d32;--r:#c62828;--bg:#eef2ff;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--f);background:var(--bg);color:#1a1a2e;font-size:15px;}
.hdr{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 3px 8px rgba(0,0,0,.25);position:sticky;top:0;z-index:10;}
.hdr h1{font-size:15px;font-weight:700;flex:1;}
.badge{background:rgba(255,255,255,.22);border-radius:20px;padding:3px 11px;font-size:12px;white-space:nowrap;}
.bk{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 6px 0 0;}
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:24px;}
.card{background:#fff;border-radius:14px;padding:16px;margin:14px 14px 0;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.st{font-size:12px;font-weight:700;color:var(--b2);text-transform:uppercase;letter-spacing:.5px;padding:16px 14px 6px;}
.fg{margin-bottom:13px;} .fg:last-child{margin-bottom:0;}
.lb{display:block;font-size:12px;font-weight:600;color:#455a64;margin-bottom:5px;}
.iw{display:flex;gap:6px;}
.ip{flex:1;min-width:0;padding:11px 12px;border:1.5px solid #cfd8dc;border-radius:9px;font-family:var(--f);font-size:14px;outline:none;background:#fff;color:#000;-webkit-appearance:none;}
.ip:focus{border-color:var(--b2);}
.mb{flex-shrink:0;width:42px;height:42px;border:1.5px solid #cfd8dc;border-radius:9px;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mb.on{background:var(--r);border-color:var(--r);}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{display:block;width:100%;padding:13px 16px;border:none;border-radius:11px;font-family:var(--f);font-size:15px;font-weight:700;cursor:pointer;text-align:center;margin-bottom:10px;-webkit-appearance:none;line-height:1.4;}
.btn:last-child{margin-bottom:0;} .btn:active{opacity:.8;}
.bp{background:var(--b);color:#fff;} .bg2{background:var(--g);color:#fff;} .bo{background:transparent;border:2px solid var(--b2);color:var(--b2);}
.ac{background:#f8f9ff;border:1.5px solid #c5cae9;border-radius:11px;padding:14px;margin-bottom:12px;}
.ah{display:flex;align-items:center;margin-bottom:12px;}
.an{background:var(--b);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:8px;flex-shrink:0;}
.at{flex:1;font-size:13px;font-weight:600;color:var(--b);}
.db{background:#ffebee;color:var(--r);border:none;border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--f);}
.cr{display:flex;align-items:center;padding:13px 14px;border:1.5px solid #e0e0e0;border-radius:11px;margin-bottom:9px;background:#fff;user-select:none;-webkit-user-select:none;}
.cr.on{border-color:var(--b2);background:#e8eaf6;}
.cr input[type=checkbox]{width:22px;height:22px;margin-right:12px;flex-shrink:0;accent-color:var(--b);}
.cl{flex:1;font-size:14px;font-weight:500;cursor:pointer;}
.cl small{display:block;font-size:11px;color:#78909c;font-weight:400;}
.dt{background:#e8eaf6;color:var(--b);border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700;}
.cr.on .dt{background:var(--b2);color:#fff;}
.sr{display:flex;gap:8px;padding:0 14px 8px;}
.sr button{flex:1;padding:9px;border:1.5px solid var(--b2);border-radius:8px;background:transparent;color:var(--b2);font-size:13px;font-family:var(--f);cursor:pointer;}
.ir{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f4f8;font-size:13px;}
.ir:last-child{border:none;} .il{color:#78909c;} .iv{font-weight:600;text-align:right;margin-left:8px;word-break:break-all;}
.bot{padding:14px;background:#fff;border-top:1px solid #e8eaf6;}
.sw{padding:16px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.mr{display:flex;gap:8px;width:100%;max-width:360px;}
.mr .ip{flex:1;}
.gb{padding:11px 18px;background:var(--b);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--f);}
.sm{width:100%;max-width:360px;border-radius:10px;padding:12px 14px;font-size:13px;text-align:center;line-height:1.6;}
.sm.ld{background:#e8eaf6;color:var(--b);} .sm.ok{background:#e8f5e9;color:var(--g);font-weight:700;} .sm.er{background:#ffebee;color:var(--r);} .sm.wn{background:#fff3e0;color:#e65100;}
#qrb{width:100%;max-width:360px;}
#qrb video{border-radius:12px !important;width:100% !important;}
.scb{display:none;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px;}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;z-index:9999;display:none;max-width:88vw;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.3);}
.sl{width:100%;max-width:360px;}
.sl-hdr{font-size:12px;font-weight:700;color:var(--b2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-left:2px;}
.si{display:flex;align-items:center;background:#fff;border:1.5px solid #c5cae9;border-radius:11px;padding:11px 14px;margin-bottom:8px;cursor:pointer;gap:10px;}
.si:active{background:#e8eaf6;}
.si-info{flex:1;min-width:0;}
.si-cn{font-size:14px;font-weight:700;color:var(--b);}
.si-nm{font-size:12px;color:#546e7a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-arr{color:var(--b2);font-size:18px;flex-shrink:0;}

/* ── Search / Transliteration / Autocomplete ── */
.search-wrap{position:relative;width:100%;max-width:360px;}
.search-input-row{display:flex;gap:6px;width:100%;}
.srch-clear{flex-shrink:0;width:36px;height:42px;border:1.5px solid #cfd8dc;border-radius:9px;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;}
.suggest-box{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #c5cae9;border-radius:0 0 10px 10px;z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 6px 16px rgba(0,0,0,.12);}
.suggest-item{padding:11px 14px;border-bottom:1px solid #f0f4f8;cursor:pointer;font-size:14px;display:flex;flex-direction:column;}
.suggest-item:last-child{border:none;}
.suggest-item:active,.suggest-item:hover{background:#e8eaf6;}
.suggest-item .s-main{font-weight:600;color:#1a237e;}
.suggest-item .s-sub{font-size:11px;color:#78909c;}
.suggest-item.new-case{color:var(--g);}
.suggest-item.new-case .s-main{color:var(--g);}
.acmp-wrap{position:relative;}
.acmp-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #c5cae9;border-radius:0 0 9px 9px;z-index:100;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.1);}
.acmp-item{padding:10px 12px;border-bottom:1px solid #f0f4f8;cursor:pointer;font-size:13px;}
.acmp-item:last-child{border:none;}
.acmp-item:active,.acmp-item:hover{background:#e8eaf6;}
.tlit-badge{font-size:10px;background:#e8eaf6;color:#3949ab;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle;}
.district-wrap{position:relative;}
.thana-wrap{position:relative;}

</style>
</head>
<body>
<div id="toast"></div>

<!-- SCREEN 1: SCAN -->
<div id="s1" style="display:flex;flex-direction:column;min-height:100vh;">
  <div class="hdr"><h1>⚖️ Court Proforma — ACJM Baghpat</h1></div>
  <div class="cnt"><div class="sw">
    <div id="qrb"></div>
    <div id="sma"></div>
    <div class="scb" id="scb">
      <button class="btn bp" style="margin:0;" onclick="startScan()">📷 Scan Shuru Karo</button>
      <button class="btn bo" style="margin:0;" onclick="stopScan()">⏹ Band Karo</button>
    </div>
    <p style="color:#546e7a;font-size:13px;text-align:center;">— Case No. type karo ya naya mukadma banao —</p>
    <div class="search-wrap" id="main-search-wrap">
      <div class="search-input-row">
        <input class="ip" id="mi" type="text" placeholder="Case No. khojo: 3802/20..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onMainSearch(this.value)" onkeydown="if(event.key==='Enter')onMainSearchGo()"/>
        <button class="srch-clear" onclick="clearMainSearch()" title="Clear">✕</button>
        <button class="gb" onclick="onMainSearchGo()">जाओ →</button>
      </div>
      <div class="suggest-box" id="main-suggest" style="display:none;"></div>
    </div>
    <div class="sl" id="saved-list"></div>
  </div></div>
</div>

<!-- SCREEN 2: NEW CASE -->
<div id="s2" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="hdr"><button class="bk" onclick="goS1()">←</button><h1>नया मुकदमा</h1><span class="badge" id="b2"></span></div>
  <div class="cnt">
    <div class="card">
      <p class="st" style="padding:0 0 12px;">मुकदमे की जानकारी</p>
      <div class="r2">
        <div class="fg"><label class="lb">Case No. *</label><input class="ip" id="nc" placeholder="3802/20"/></div>
        <div class="fg"><label class="lb">CC No.</label><input class="ip" id="ncc" placeholder="256/14"/></div>
      </div>
      <div class="fg"><label class="lb">धारा (Section) *</label><input class="ip" id="ns" placeholder="366 IPC"/></div>
      <div class="r2">
        <div class="fg"><label class="lb">जिला</label>
          <div class="district-wrap">
            <input class="ip" id="nd" placeholder="जिला टाइप करें..." autocomplete="off" oninput="onDistrictInput('nd','np')" onfocus="onDistrictInput('nd','np')"/>
            <div class="acmp-list" id="nd-list" style="display:none;"></div>
          </div>
        </div>
        <div class="fg"><label class="lb">थाना (PS) *</label>
          <div class="thana-wrap">
            <div class="iw"><input class="ip" id="np" placeholder="थाना टाइप करें..." autocomplete="off" oninput="onThanaInput('np','nd')" onfocus="onThanaInput('np','nd')"/><button class="mb" onclick="sv('np',this)">🎤</button></div>
            <div class="acmp-list" id="np-list" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div class="fg"><label class="lb">अगली तारीख (Fix)</label><input class="ip" id="nf" type="date"/></div>
    </div>
    <p class="st">अभियुक्त की सूची</p>
    <div id="nal" style="padding:0 14px;"></div>
    <div style="padding:6px 14px 0;"><button class="btn bo" onclick="addAN()">+ अभियुक्त जोड़ें</button></div>
  </div>
  <div class="bot"><button class="btn bp" onclick="saveN()">💾 मुकदमा सेव करें</button></div>
</div>

<!-- SCREEN 3: FOUND -->
<div id="s3" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="hdr"><button class="bk" onclick="goS1()">←</button><h1>मुकदमा मिला</h1><span class="badge" id="b3"></span></div>
  <div class="cnt">
    <div class="card" id="ci"></div>
    <p class="st">अभियुक्त चुनें</p>
    <div class="sr"><button onclick="sa('ac',true)">☑ सभी</button><button onclick="sa('ac',false)">☐ कोई नहीं</button></div>
    <div id="ack" style="padding:0 14px;"></div>
    <p class="st">प्रपत्र चुनें</p>
    <div class="sr"><button onclick="sa('dc',true)">☑ सभी</button><button onclick="sa('dc',false)">☐ कोई नहीं</button></div>
    <div id="dck" style="padding:0 14px;"></div>
  </div>
  <div class="bot">
    <button class="btn bg2" onclick="genD()">📄 प्रपत्र बनाएं &amp; Download</button>
    <button class="btn bo" onclick="goEdit()">✏️ जानकारी बदलें / Accused Add करें</button>
  </div>
</div>

<!-- SCREEN 4: EDIT -->
<div id="s4" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="hdr"><button class="bk" onclick="rF();goS('s3')">←</button><h1>जानकारी संपादित करें</h1><span class="badge" id="b4"></span></div>
  <div class="cnt">
    <div class="card">
      <p class="st" style="padding:0 0 12px;">मुकदमे की जानकारी</p>
      <div class="r2">
        <div class="fg"><label class="lb">CC No.</label><input class="ip" id="ec"/></div>
        <div class="fg"><label class="lb">जिला</label>
          <div class="district-wrap">
            <input class="ip" id="ed" placeholder="जिला टाइप करें..." autocomplete="off" oninput="onDistrictInput('ed','ep')" onfocus="onDistrictInput('ed','ep')"/>
            <div class="acmp-list" id="ed-list" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div class="fg"><label class="lb">धारा</label><input class="ip" id="es"/></div>
      <div class="fg"><label class="lb">थाना</label>
        <div class="thana-wrap">
          <div class="iw"><input class="ip" id="ep" placeholder="थाना टाइप करें..." autocomplete="off" oninput="onThanaInput('ep','ed')" onfocus="onThanaInput('ep','ed')"/><button class="mb" onclick="sv('ep',this)">🎤</button></div>
          <div class="acmp-list" id="ep-list" style="display:none;"></div>
        </div>
      </div>
      <div class="fg"><label class="lb">अगली तारीख</label><input class="ip" id="ef" type="date"/></div>
    </div>
    <p class="st">अभियुक्त की सूची</p>
    <div id="eal" style="padding:0 14px;"></div>
    <div style="padding:6px 14px 0;"><button class="btn bo" onclick="addAE()">+ अभियुक्त जोड़ें</button></div>
  </div>
  <div class="bot"><button class="btn bp" onclick="saveE()">💾 अपडेट करें</button></div>
</div>

// ── localStorage ──
const LS='cpf5_';

// Show all saved cases on scan screen
function showSaved(){
  const sl=el('saved-list');
  if(!sl)return;
  const keys=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith(LS))keys.push(k);
    }
  }catch(e){}
  if(!keys.length){sl.innerHTML='';return;}
  keys.sort();
  let html='<div class="sl-hdr">📁 Saved Cases ('+keys.length+')</div>';
  keys.forEach(k=>{
    try{
      const d=JSON.parse(localStorage.getItem(k));
      if(!d)return;
      const names=d.accused?d.accused.map(a=>a.name).filter(Boolean).join(', '):'';
      html+='<div class="si" data-cn="'+d.caseNo+'" onclick="onCaseNo(this.dataset.cn)">'
        +'<div class="si-info">'
        +'<div class="si-cn">'+d.caseNo+'</div>'
        +'<div class="si-nm">'+names+(d.section?' | '+d.section:'')+'</div>'
        +'</div>'
        +'<span class="si-arr">›</span>'
        +'</div>';
    }catch(e){}
  });
  sl.innerHTML=html;
}
function lsS(o){try{localStorage.setItem(LS+o.caseNo,JSON.stringify(o));return true;}catch(e){toast('❌ Save fail');return false;}}
function lsL(k){try{const s=localStorage.getItem(LS+k);return s?JSON.parse(s):null;}catch(e){return null;}}

// ── QR Scanner ──
let scanner=null,scanReady=false,scanning=false;
function loadLib(){
  if(typeof Html5Qrcode!=='undefined'){onLibReady();return;}
  sMsg('📡 Scanner load ho raha hai...','ld');
  const tryLoad=url=>new Promise(res=>{const s=document.createElement('script');s.src=url;s.onload=()=>res(typeof Html5Qrcode!=='undefined');s.onerror=()=>res(false);document.head.appendChild(s);});
  tryLoad('https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js')
    .then(ok=>ok?(onLibReady(),Promise.resolve(true)):tryLoad('https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js'))
    .then(ok=>{if(ok===true)return;if(ok){onLibReady();}else{sMsg('❌ Scanner load nahi hua — Case No. type karo','er');}});
}
function onLibReady(){scanReady=true;el('scb').style.display='grid';sMsg('✅ Scanner ready — "Scan Shuru Karo" dabao','ok');}
function startScan(){
  if(!scanReady){toast('Scanner load ho raha hai...');return;}
  if(scanning){toast('Scanner chal raha hai');return;}
  sMsg('📷 Camera shuru ho raha hai...','ld');
  if(!scanner)scanner=new Html5Qrcode('qrb');
  Html5Qrcode.getCameras().then(devices=>{
    if(!devices||!devices.length){sMsg('❌ Camera nahi mila','er');return Promise.reject('no cam');}
    const cam=devices.find(d=>/back|rear|environ/i.test(d.label))||devices[devices.length-1];
    return scanner.start(cam.id,{fps:12,qrbox:{width:250,height:250},aspectRatio:1},
      raw=>{const cn=parseQR(raw);if(cn){stopScan();sMsg(`✅ Case No: <b>${cn}</b>`,'ok');setTimeout(()=>onCaseNo(cn),600);}
            else{el('mi').value=raw;sMsg(`⚠️ QR: ${raw}<br>Confirm karke "जाओ" dabao`,'wn');}},()=>{});
  }).then(()=>{scanning=true;sMsg('🔍 QR code camera ke saamne rakho','ld');})
  .catch(err=>{scanning=false;const m=String(err);
    if(m.includes('NotAllowed')||m.includes('Permission'))sMsg('❌ Camera permission denied<br><small>Chrome: 🔒 → Camera → Allow → Refresh</small>','er');
    else if(!m.includes('no cam'))sMsg('❌ Camera error — Case No. type karo','er');});
}
function stopScan(){if(scanner&&scanning){scanner.stop().catch(()=>{});scanning=false;}}
function parseQR(r){if(!r)return null;const t=r.trim();const pp=[/Case\s*No[.\-:]*\s*([0-9]+[\/\-][0-9]+)/i,/No[.\-:]+([0-9]+[\/\-][0-9]+)/i,/([0-9]{2,6}\/[0-9]{2,4})/,/^([0-9]+[\/\-][0-9]+)$/];for(const p of pp){const m=t.match(p);if(m&&m[1])return m[1].replace('-','/');}return t.length<=20&&t.length>=3?t:null;}

// ── Generate Excel ──
function genD(){
  const sA=[];document.querySelectorAll('[name="ac"]:checked').forEach(cb=>sA.push(cc.accused[+cb.value]));
  const sD=[];document.querySelectorAll('[name="dc"]:checked').forEach(cb=>sD.push(cb.value));
  if(!sA.length){toast('Koi accused nahi chuna');return;}
  if(!sD.length){toast('Koi document nahi chuna');return;}
  if(typeof XLSX==='undefined'){
    toast('Excel library load ho rahi hai... 2 sec mein dobara try karo');
    loadXLSX();return;
  }
  const c=cc;
  const fd=c.fixDate?new Date(c.fixDate+'T00:00:00').toLocaleDateString('hi-IN',{day:'2-digit',month:'long',year:'numeric'}):'';
  const wb={SheetNames:[],Sheets:{}};
  const DOC_NAMES={summon:'Summon',bw:'BW',nbw:'NBW',p82:'82-CRPC',k83:'83-CRPC'};
  let sheetIdx=0;
  sA.forEach(acc=>{
    sD.forEach(dt=>{
      sheetIdx++;
      const sheetName=DOC_NAMES[dt]+(sA.length>1?'_'+acc.name.substring(0,6):'');
      const safeNm=sheetName.replace(/[:\\\/\?\*\[\]]/g,'').substring(0,31);
      try{
        const tmplWb=XLSX.read(TMPL[dt],{type:'base64',cellStyles:true,bookSST:false});
        const tmplWs=tmplWb.Sheets[tmplWb.SheetNames[0]];
        fillCells(tmplWs,dt,c,acc,fd);
        wb.SheetNames.push(safeNm);
        wb.Sheets[safeNm]=tmplWs;
      }catch(e){console.error('Sheet error:',e);}
    });
  });
  if(!wb.SheetNames.length){toast('❌ Document generate nahi hua');return;}
  try{
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});
    const blob=new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='Proforma_'+c.caseNo.replace('/','_')+'.xlsx';
    a.style.display='none';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),10000);
    toast('📥 Excel download ho rahi hai — open karke Print karo',3500);
  }catch(e){toast('❌ Excel error: '+e.message);console.error(e);}
}

// ── Voice ──
let aR=null;
function sv(iid,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('❌ Voice typing support nahi hai');return;}
  if(aR&&btn.classList.contains('on')){aR.stop();return;}
  if(aR){try{aR.stop();}catch(e){}}
  const rec=new SR();aR=rec;rec.lang='hi-IN';rec.interimResults=true;rec.continuous=false;
  const inp=el(iid),orig=inp.value;
  btn.textContent='🔴';btn.classList.add('on');
  rec.onresult=e=>{let f='',t='';for(let i=e.resultIndex;i<e.results.length;i++)e.results[i].isFinal?f+=e.results[i][0].transcript:t+=e.results[i][0].transcript;inp.value=(orig+' '+(f||t)).trim();};
  rec.onerror=e=>{btn.textContent='🎤';btn.classList.remove('on');aR=null;toast(e.error==='not-allowed'?'Mic permission do':'Error: '+e.error);};
  rec.onend=()=>{btn.textContent='🎤';btn.classList.remove('on');aR=null;};
  rec.start();toast('🎤 Bol rahe hain...',3000);
}

// ── Load SheetJS for Excel generation ──
function loadXLSX(){
  return new Promise(res=>{
    if(typeof XLSX!=='undefined'){res(true);return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload=()=>{console.log('SheetJS OK');res(true);};
    s.onerror=()=>{
      const s2=document.createElement('script');
      s2.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
      s2.onload=()=>{console.log('SheetJS OK (fallback)');res(true);};
      s2.onerror=()=>{console.warn('SheetJS load failed');res(false);};
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  });
}

const ALL_DISTRICTS = Object.keys(DISTRICT_THANA);

// ══════════════════════════════════════════════
// DISTRICT AUTOCOMPLETE
// ══════════════════════════════════════════════
function onDistrictInput(distId, thanaId) {
  const val = (el(distId).value || '').trim();
  const listId = distId + '-list';
  const listEl = el(listId);
  if (!listEl) return;
  const matches = val.length === 0
    ? ALL_DISTRICTS.slice(0, 20)
    : ALL_DISTRICTS.filter(d => d.includes(val) || pinyin(val, d));
  if (!matches.length) { listEl.style.display = 'none'; return; }
  listEl.innerHTML = matches.map(d =>
    `<div class="acmp-item" onmousedown="pickDistrict('${distId}','${thanaId}','${d}')">${d}</div>`
  ).join('');
  listEl.style.display = 'block';
  // close on outside click
  setTimeout(() => {
    document.addEventListener('click', function _hide(e) {
      if (!e.target.closest('.district-wrap')) { listEl.style.display = 'none'; }
      document.removeEventListener('click', _hide);
    });
  }, 0);
}

function pickDistrict(distId, thanaId, dist) {
  el(distId).value = dist;
  const listEl = el(distId + '-list');
  if (listEl) listEl.style.display = 'none';
  // clear thana
  if (el(thanaId)) { el(thanaId).value = ''; }
  onThanaInput(thanaId, distId);
}

// ══════════════════════════════════════════════
// THANA AUTOCOMPLETE
// ══════════════════════════════════════════════
function onThanaInput(thanaId, distId) {
  const distVal = el(distId) ? (el(distId).value || '').trim() : '';
  const val = (el(thanaId).value || '').trim();
  const listId = thanaId + '-list';
  const listEl = el(listId);
  if (!listEl) return;
  // Get thana list for district
  let thanas = [];
  if (distVal && DISTRICT_THANA[distVal]) {
    thanas = DISTRICT_THANA[distVal];
  } else {
    // show all thanas from all districts
    thanas = [].concat(...Object.values(DISTRICT_THANA));
    // deduplicate
    thanas = [...new Set(thanas)];
  }
  const matches = val.length === 0
    ? thanas.slice(0, 20)
    : thanas.filter(t => t.includes(val) || pinyin(val, t));
  if (!matches.length) { listEl.style.display = 'none'; return; }
  listEl.innerHTML = matches.map(t =>
    `<div class="acmp-item" onmousedown="pickThana('${thanaId}','${t}')">${t}</div>`
  ).join('');
  listEl.style.display = 'block';
  setTimeout(() => {
    document.addEventListener('click', function _hide(e) {
      if (!e.target.closest('.thana-wrap')) { listEl.style.display = 'none'; }
      document.removeEventListener('click', _hide);
    });
  }, 0);
}

function pickThana(thanaId, thana) {
  el(thanaId).value = thana;
  const listEl = el(thanaId + '-list');
  if (listEl) listEl.style.display = 'none';
}

// MAIN SEARCH (Screen 1)
// ══════════════════════════════════════════════
function onMainSearch(val) {
  val = (val || '').trim();
  const box = el('main-suggest');
  if (!val) { box.style.display = 'none'; return; }
  // Gather saved cases
  const matches = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS)) {
        const d = JSON.parse(localStorage.getItem(k));
        if (d && d.caseNo && d.caseNo.toLowerCase().includes(val.toLowerCase())) {
          matches.push(d);
        }
      }
    }
  } catch(e) {}
  let html = '';
  matches.slice(0, 6).forEach(d => {
    const names = d.accused ? d.accused.map(a => a.name).filter(Boolean).join(', ') : '';
    html += `<div class="suggest-item" onclick="onCaseNo('${d.caseNo}')">
      <span class="s-main">${d.caseNo}</span>
      <span class="s-sub">${names}${d.section ? ' | ' + d.section : ''}</span>
    </div>`;
  });
  // Always add "New case" option
  html += `<div class="suggest-item new-case" onclick="loadNF('${val}');goS('s2')">
    <span class="s-main">➕ नया मुकदमा: ${val}</span>
    <span class="s-sub">इस Case No. से नया मुकदमा बनाएं</span>
  </div>`;
  box.innerHTML = html;
  box.style.display = 'block';
}

function onMainSearchGo() {
  const val = (el('mi').value || '').trim();
  if (!val) { toast('Case No. daalo'); return; }
  el('main-suggest').style.display = 'none';
  const ex = lsL(val);
  if (ex) { cc = ex; rF(); goS('s3'); }
  else { loadNF(val); goS('s2'); }
}

function clearMainSearch() {

}

// ══════════════════════════════════════════════
// AUTOCOMPLETE FOR NAME FIELDS (from saved data)
// ══════════════════════════════════════════════
function getAllSavedNames() {
  const names = new Set(), fathers = new Set(), villages = new Set();
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS)) {
        const d = JSON.parse(localStorage.getItem(k));
        if (d && d.accused) {
          d.accused.forEach(a => {
            if (a.name) names.add(a.name);
            if (a.fatherName) fathers.add(a.fatherName);
            if (a.village) villages.add(a.village);
          });
        }
      }
    }
  } catch(e) {}
  return { names: [...names], fathers: [...fathers], villages: [...villages] };
}

function showNameSuggest(inputEl, type) {
  const val = (inputEl.value || '').trim();
  const { names, fathers, villages } = getAllSavedNames();
  const pool = type === 'father' ? fathers : type === 'village' ? villages : names;
  const matches = val.length === 0
    ? pool.slice(0, 8)
    : pool.filter(n => n.includes(val));
  if (!matches.length) { hideNameSuggest(inputEl); return; }
  let box = inputEl._suggestBox;
  if (!box) {
    box = document.createElement('div');
    box.className = 'acmp-list';
    inputEl.parentNode.style.position = 'relative';
    inputEl.parentNode.appendChild(box);
    inputEl._suggestBox = box;
  }
  box.innerHTML = matches.map(n =>
    `<div class="acmp-item" onmousedown="pickNameSuggest(event,'${n.replace(/'/g,"\\'")}',this)">${n}</div>`
  ).join('');
  box.style.display = 'block';
}

function pickNameSuggest(evt, val, item) {
  evt.preventDefault();
  const box = item.parentNode;
  const inp = box.previousElementSibling || box.parentNode.querySelector('input');
  // find associated input
  const wrap = box.parentNode;
  const ip = wrap.querySelector ? wrap.querySelector('input.ip') : null;
  if (ip) ip.value = val;
  box.style.display = 'none';
}

function hideNameSuggest(inputEl) {
  if (inputEl._suggestBox) inputEl._suggestBox.style.display = 'none';
}

// Patch rA to add autocomplete on name fields
const _orig_rA = rA;
function rA(cid, arr, pfx, aFn, dFn) {
  _orig_rA(cid, arr, pfx, aFn, dFn);
  // After rendering, attach autocomplete listeners
  setTimeout(() => {
    arr.forEach((a, i) => {
      attachNameAC(`${pfx}n${i}`, 'name');
      attachNameAC(`${pfx}f${i}`, 'father');
      attachNameAC(`${pfx}v${i}`, 'village');
    });
  }, 100);
}

function attachNameAC(id, type) {
  const inp = el(id);
  if (!inp || inp._acAttached) return;
  inp._acAttached = true;
  inp.addEventListener('input', () => showNameSuggest(inp, type));
  inp.addEventListener('focus', () => showNameSuggest(inp, type));
  inp.addEventListener('blur', () => setTimeout(() => hideNameSuggest(inp), 200));
  // Wrap in relative container if not already
  if (inp.parentNode && inp.parentNode.tagName !== 'DIV') return;
  // ensure parent is relative
  inp.parentNode.style.position = inp.parentNode.style.position || 'relative';
}

const TLIT_MAP = {
  'aa':'ा','ii':'ी','uu':'ू','ee':'ी','oo':'ू',
  'kh':'ख','gh':'घ','ch':'च','chh':'छ','jh':'झ',

  'h':'ह','i':'ि','j':'ज','k':'क','l':'ल','m':'म','n':'न',
  'o':'ओ','p':'प','q':'क','r':'र','s':'स','t':'त','u':'उ',
  'v':'व','w':'व','x':'क्ष','y':'य','z':'ज',
};

// Phonetic transliteration table (word-level, common Hindi words/names)
const WORD_MAP = {
  'ram':'राम','shyam':'श्याम','mohan':'मोहन','sohan':'सोहन',
  'rajesh':'राजेश','suresh':'सुरेश','mahesh':'महेश','dinesh':'दिनेश',
  'mukesh':'मुकेश','rakesh':'राकेश','viresh':'वीरेश','naresh':'नरेश',
  'ravi':'रवि','kavi':'कवि','sanjay':'संजय','ajay':'अजय','vijay':'विजय',
  'rohit':'रोहित','mohit':'मोहित','ankit':'अंकित','sumit':'सुमित',
  'amit':'अमित','lalit':'ललित','kapil':'कपिल','anil':'अनिल',
  'sunil':'सुनील','sachin':'सचिन','arjun':'अर्जुन','ranjit':'रणजीत',
  'ranjeet':'रणजीत','gurpreet':'गुरप्रीत','manpreet':'मनप्रीत',
  'singh':'सिंह','kumar':'कुमार','lal':'लाल','prasad':'प्रसाद',
  'ram prasad':'राम प्रसाद','shiv':'शिव','shankar':'शंकर',
  'narayan':'नारायण','jagdish':'जगदीश','ramesh':'रमेश',
  'ratan':'रतन','madan':'मदन','charan':'चरण','girish':'गिरीश',
  'santosh':'संतोष','satish':'सतीश','harish':'हरीश','ganesh':'गणेश',
  'vikas':'विकास','deepak':'दीपक','neeraj':'नीरज','sanjiv':'संजीव',
  'ashok':'अशोक','alok':'आलोक','vivek':'विवेक','abhi':'अभि',
  'abhishek':'अभिषेक','pradeep':'प्रदीप','rakhi':'राखी',
  // Villages / Places
  'baghpat':'बागपत','meerut':'मेरठ','delhi':'दिल्ली',
  'noida':'नोएडा','ghaziabad':'गाजियाबाद','agra':'आगरा',
  'mathura':'मथुरा','aligarh':'अलीगढ़','lucknow':'लखनऊ',
  'chhaprauli':'छपरौली','baraut':'बड़ौत','hapur':'हापुड़',
  'muzaffarnagar':'मुजफ्फरनगर','saharanpur':'सहारनपुर',
  'shamli':'शामली','bulandshahr':'बुलंदशहर',
  // Fathers etc
  'son of':'पुत्र','wife of':'पत्नी','daughter of':'पुत्री',
};

function transliterateWord(word) {
  const w = word.toLowerCase();
  if (WORD_MAP[w]) return WORD_MAP[w];
  return null;
}

function transliterateChar(text) {
  // Simple character-level fallback
  let result = '';
  let i = 0;
  while (i < text.length) {
    // Try 3-char
    if (i + 2 < text.length) {
      const tri = text.substr(i, 3).toLowerCase();
      if (TLIT_MAP[tri]) { result += TLIT_MAP[tri]; i += 3; continue; }
    }
    // Try 2-char
    if (i + 1 < text.length) {
      const bi = text.substr(i, 2).toLowerCase();
      if (TLIT_MAP[bi]) { result += TLIT_MAP[bi]; i += 2; continue; }
    }
    const ch = text[i].toLowerCase();
    result += TLIT_MAP[ch] || text[i];
    i++;
  }
  return result;
}

// Main transliteration function — applied to input fields
function applyTranslit(inp) {
  const val = inp.value;
  if (!val) return;
  // Check if text is already Devanagari (>50% Hindi chars)
  const hindiCount = (val.match(/[\u0900-\u097F]/g) || []).length;
  if (hindiCount / val.length > 0.4) return; // already Hindi enough
  // Split by spaces and transliterate each word
  const words = val.split(/\s+/);
  const converted = words.map(w => {
    if (!w) return w;
    const translated = transliterateWord(w);
    if (translated) return translated;
    // char-level fallback
    return transliterateChar(w);
  }).join(' ');
  if (converted !== val) {
    const pos = inp.selectionStart;
    inp.value = converted;
    try { inp.setSelectionRange(pos, pos); } catch(e) {}
  }
}

// Button to toggle transliteration for a field
function addTranslitBtn(inputId) {
  const inp = el(inputId);
  if (!inp || inp._tlitBtn) return;
  inp._tlitBtn = true;
  const btn = document.createElement('button');
  btn.className = 'mb';
  btn.title = 'English → Hindi convert';
  btn.textContent = 'अ';
  btn.style.fontSize = '13px';
  btn.onclick = (e) => { e.preventDefault(); applyTranslit(inp); };
  inp.parentNode.insertBefore(btn, inp.nextSibling);
}
